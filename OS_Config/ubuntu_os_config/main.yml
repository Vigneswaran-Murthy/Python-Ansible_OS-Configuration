- name: Configure system timezone based on hostname
  hosts: all
  become: yes
  tags:
    - timezone
  vars:
    timezones:
      ULS: "America/Los_Angeles"
      USE: "America/Los_Angeles"
      USS: "America/Los_Angeles"
      USG: "America/Los_Angeles"
      UIM: "America/Los_Angeles"
      ULF:  "America/Los_Angeles"
      TBM: "Asia/Bangkok"
      TBB: "Asia/Bangkok"
      TPT: "Asia/Bangkok"
      IKY: "Asia/Jerusalem"
      CSJ: "Asia/Shanghai"
      CSS: "Asia/Shanghai"
      CSF: "Asia/Shanghai"
      IOI: "Asia/Jerusalem"
      IBP: "Asia/Kolkata"
      IBN: "Asia/Kolkata" ##added new manually
      IBS: "Asia/Kolkata"
      IBV: "Asia/Kolkata"
      IBT: "Asia/Kolkata"
      KSG: "Asia/Seoul"
      MSK: "Asia/Kuala_Lumpur"
      MJP: "Asia/Kuala_Lumpur"
      MPP: "Asia/Kuala_Lumpur"
      MPL: "Asia/Kuala_Lumpur"
      MPS: "Asia/Kuala_Lumpur"
      PBT: "Asia/Manila"
      JAN: "Asia/Tokyo"
      JFK: "Asia/Tokyo"
      JOK: "Asia/Tokyo"
      JOM: "Asia/Tokyo"
      JTK: "Asia/Tokyo"
      JON: "Asia/Tokyo"
      JYU: "Asia/Tokyo"
      JOO: "Asia/Tokyo"
      JTY: "Asia/Tokyo"
      JYY: "Asia/Tokyo"
      IBH: "Asia/Kolkata"
      
      
  ignore_errors: yes

  tasks:
    - name: Detect site code from hostname
      set_fact:
        site_code: "{{ item }}"
      when: inventory_hostname | upper is search(item)
      loop: "{{ timezones.keys() }}"
      ignore_errors: yes

    - name: Fail if no site code detected
      set_fact:
        tz_result:
          failed: true
          msg: "No matching location code found in {{ inventory_hostname }}"
