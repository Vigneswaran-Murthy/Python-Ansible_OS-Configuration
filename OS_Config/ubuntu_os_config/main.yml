# Domain join 
###############################################################################

- name: Domain join (manual – mark as failed)
  hosts: all
  become: true
  tags:
    - Domain_join

  tasks:

    - name: Install packages required for AD domain join
      apt:
        name:
          - realmd
          - sssd
          - sssd-tools
          - sssd-ad
          - adcli
          - packagekit
          - krb5-user
          - samba-common-bin
          - python3-pexpect
        state: present
        update_cache: yes
      register: domain_pkg_result

    - name: Mark domain join as FAILED (manual action required)
      import_tasks: log_task_status.yml
      vars:
        task_name: "Domain Join"
        task_result:
          failed: true
          msg: "Domain join is a MANUAL step – not executed by automation"


########################################################################
# Send email for each host 
# version 2
########################################################################

- name: Send email for each host
  hosts: localhost
  gather_facts: no

  vars_files:
    - vars/OU_vars.yml
    - vars/e_vars.yml
    
  vars:
    executed_by: "{{ hostvars['localhost'].playbook_executor }}"

  tasks:
    - name: Read status file for each host
      set_fact:
        host_status_lines: >-
          {{
            (
              lookup('file', playbook_dir ~ '/ansible_output/' ~ item ~ '/status.txt', errors='ignore')
              .splitlines()
            ) if lookup('file', playbook_dir ~ '/ansible_output/' ~ item ~ '/status.txt', errors='ignore') | length > 0
            else ['No tasks executed for this host']
          }}
      loop: "{{ groups['all'] }}"
      register: host_statuses

    - name: Send email
      mail:
        to: "{{ mail_to }}"
        from: "{{ mail_from }}"
        cc: "{{ mail_cc }}"
        subject: "Playbook Task Status Summary - {{ item.item }}"
        subtype: html
        body: "{{ email_html_body }}"
      loop: "{{ host_statuses.results }}"
