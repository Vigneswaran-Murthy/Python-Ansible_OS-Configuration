- name: Collect executor name 
  hosts: localhost
  gather_facts: no
  run_once: true

  vars_prompt:
    - name: executor_name
      prompt: "Enter your name (execution owner)"
      private: no
      default: ""


  tasks:
    - name: Validate executor name is provided
      assert:
        that:
          - executor_name | trim | length > 0
        fail_msg: >
          ❌ Execution stopped.
          Executor name is mandatory. Please rerun and enter your name.

    - name: Save executor name globally
      set_fact:
        playbook_executor: "{{ executor_name | trim }}"
       
#- import_playbook: "{{ playbook_dir }}/vars/validate_playbook.yml"
- import_playbook: "{{ playbook_dir }}/validate_playbook.yml"
  vars:
    target_playbook: "{{ playbook_dir }}/main.yml"
    expected_path: "/data/automation/os_config/ubuntu_os_config/main.yml"

# ----------------------------
# 1️ Root Password Change
# ----------------------------
- name: Change root password
  hosts: all
  become: yes
  gather_facts: no
  tags:
    - root

  vars_files:
    - vars/root_password.yml

  tasks:
    - name: Set root password
      user:
        name: root
        password: "{{ root_password_plain | password_hash('sha512') }}"
      register: root_pw_result
      ignore_errors: yes

    - name: Log root password change
      import_tasks: log_task_status.yml
      vars:
        task_result: "{{ root_pw_result }}"
        task_name: "Root password change"

- name: 2. Change system hostname
  hosts: all
  become: yes
  gather_facts: no
  tags: [hostname]
  tasks:
    - block:
        - name: Set new hostname using inventory name
          hostname:
            name: "{{ inventory_hostname }}"
          register: hostname_result
          failed_when: false
      rescue:
        - name: Mark hostname change as failed
          set_fact:
            hostname_result:
              failed: true
              msg: "Hostname change failed for {{ inventory_hostname }}"
      always:
        - name: Log hostname change
          import_tasks: log_task_status.yml
          vars:
            task_result: "{{ hostname_result }}"
            task_name: "hostname change"
          ignore_errors: yes

########################################################################
### Update Resolv.conf file for ubuntu servers 
#######################################################################

- name: Custom resolv.conf on Ubuntu (safe)
  hosts: all
  become: yes
  gather_facts: yes
  tags: resolv

  vars:
    dns_servers: |
      search sandisk.com corp.sandisk.com
      nameserver 10.86.1.1
      nameserver 10.86.2.1

  tasks:

    - name: Remove existing resolv.conf
      file:
        path: /etc/resolv.conf
        state: absent

    - name: Deploy custom resolv.conf
      copy:
        dest: /etc/resolv.conf
        content: "{{ dns_servers }}"
        owner: root
        group: root
        mode: '0644'

    - name: Verify resolv.conf
      command: cat /etc/resolv.conf
      register: resolv_output
      changed_when: false

    - debug:
        msg: "{{ resolv_output.stdout }}"

    - name: Add immutable bit to /etc/resolv.conf (Ubuntu only)
      command: chattr +i /etc/resolv.conf
      when: ansible_distribution == "Ubuntu"
      ignore_errors: yes
      failed_when: false
      become: yes

    - name: Verify resolv.conf content
      command: cat /etc/resolv.conf
      register: resolv_output
      changed_when: false

    - name: Print resolv.conf
      debug:
        msg: "{{ resolv_output.stdout }}"

    - name: Add the result to the Log files 
      import_tasks: log_task_status.yml
      vars:
            task_result: "{{ resolv_results }}"
            task_name:  Update resolv.conf
            ignore_errors: yes



