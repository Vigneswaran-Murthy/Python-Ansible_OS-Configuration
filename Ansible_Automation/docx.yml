Ansible Adhoc commands: -

ansible dev -i inventory.txt -m yum -a "name=httpd state=present" -b   //dev = group name -iinventory file yum=module a = arguments or parameters b=become sudo

ansible dev -i inventory.txt -m service -a "name=httpd state=started" -b  //to start the service

ansible dev -i inventory.txt -m copy -a "src=/root/index.html dest=/var/www/html/" -b  //to copy file from control node to managed node


Ansible playbooks: -

ansible-playbook -i inventory.txt main.yml --check //to do dry run

ansible-playbook -i inventory.txt main.yml --syntax-check //to check syntax errors

ansible-playbook -i inventory.txt main.yml  //to execute the playbook  in inventory i mentioned [APP]


