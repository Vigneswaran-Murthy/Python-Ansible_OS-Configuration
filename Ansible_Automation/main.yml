---
- name: Install httpd on clients
  hosts: APP
  become: yes

  tasks:
    - name: Install httpd package
      yum:
        name: httpd
        state: present

    - name: Start httpd service
      service:
        name: httpd
        state: started

    - name: Copy index.html to web server
      copy:
        src: /home/ansible/index.html
        dest: /var/www/html/index.html
        mode: '0644'
